<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>HOota Academy</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;800&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Cairo', sans-serif;
  background: linear-gradient(180deg,#3b0a6d,#0b0f1a);
  height:100vh;
  overflow:hidden;
  color:#fff;
}

/* stars */
body::before{
  content:"";
  position:absolute;
  width:100%;
  height:100%;
  background:url("https://www.transparenttextures.com/patterns/stardust.png");
  opacity:0.4;
}

/* NAV */
nav{
  position:absolute;
  width:100%;
  display:flex;
  justify-content:space-between;
  padding:15px 25px;
  z-index:2;
}

.logo{color:#00cfff;font-weight:800}

/* AUTH */
.container{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
}

.auth-box{
  backdrop-filter: blur(20px);
  background: rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.2);
  padding:40px;
  border-radius:25px;
  width:350px;
  text-align:center;
  box-shadow:0 0 40px rgba(0,0,0,0.5);
  animation:fadeIn 0.6s ease;
}

.input-group{
  margin:15px 0;
}

.input-group input{
  width:100%;
  padding:14px;
  border:none;
  border-radius:30px;
  background:rgba(255,255,255,0.1);
  color:#fff;
  outline:none;
}

.btn{
  width:100%;
  padding:14px;
  border:none;
  border-radius:30px;
  background:#fff;
  color:#000;
  font-weight:bold;
  cursor:pointer;
  transition:0.3s;
}
.btn:hover{transform:scale(1.05)}

.link{
  margin-top:15px;
  cursor:pointer;
  display:block;
}

.footer{
  margin-top:20px;
  opacity:0.7;
}

/* DASHBOARD */
.dashboard{
  padding:100px 20px;
  text-align:center;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
}

.card{
  background:#111827;
  padding:20px;
  border-radius:15px;
  cursor:pointer;
  transition:0.3s;
}
.card:hover{
  transform:translateY(-5px);
  border:1px solid #00cfff;
}

/* COURSE */
.course{
  max-width:900px;
  margin:auto;
  padding:80px 20px;
  line-height:1.8;
}

.back-btn{
  border:1px solid #00cfff;
  color:#00cfff;
  background:transparent;
  padding:10px 25px;
  border-radius:30px;
  cursor:pointer;
  margin-bottom:20px;
}
.back-btn:hover{
  background:#00cfff;
  color:#000;
}

/* TOAST */
.toast{
  position:fixed;
  top:20px;
  right:20px;
  background:#111;
  border-left:5px solid #00cfff;
  padding:15px;
  border-radius:10px;
  opacity:0;
  transform:translateX(100px);
  transition:0.4s;
}
.toast.show{
  opacity:1;
  transform:translateX(0);
}

.hidden{display:none}

@keyframes fadeIn{
  from{opacity:0; transform:translateY(20px)}
  to{opacity:1}
}
</style>
</head>

<body>

<nav>
  <div class="logo">HOota Academy</div>
  <div id="navUser" class="hidden">
    <span id="userEmail"></span>
    <button class="btn" onclick="logout()">خروج</button>
  </div>
</nav>

<!-- AUTH -->
<div id="auth" class="container">
<div class="auth-box">

<div id="loginBox">
<h2>Login</h2>

<div class="input-group">
<input id="logEmail" placeholder="Username">
</div>

<div class="input-group">
<input id="logPass" type="password" placeholder="Password">
</div>

<button class="btn" onclick="login()">Login</button>

<span class="link" onclick="showRegister()">Don't have account? Register</span>
</div>

<div id="registerBox" class="hidden">
<h2>Register</h2>

<div class="input-group">
<input id="regName" placeholder="Name">
</div>

<div class="input-group">
<input id="regEmail" placeholder="Email">
</div>

<div class="input-group">
<input id="regPass" type="password" placeholder="Password">
</div>

<button class="btn" onclick="register()">Create</button>

<span class="link" onclick="showLogin()">Back to Login</span>
</div>

<div class="footer">
حووته<br>HOota.com
</div>

</div>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="dashboard hidden">
<h2>🎓 الكورسات</h2>

<div class="grid">
<div class="card" onclick="openCourse('html')">HTML</div>
<div class="card" onclick="openCourse('css')">CSS</div>
<div class="card" onclick="openCourse('js')">JavaScript</div>
</div>
</div>

<!-- COURSE -->
<div id="coursePage" class="hidden">
<div class="course">

<button class="back-btn" onclick="back()">⬅ رجوع</button>

<div id="courseContent"></div>

</div>
</div>

<div id="toast" class="toast"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
getAuth,
createUserWithEmailAndPassword,
signInWithEmailAndPassword,
onAuthStateChanged,
signOut
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const firebaseConfig = {
apiKey: "AIzaSyBsvF9J_DneR5H0JbOW4HX_JjVWaajAUgk",
authDomain: "website-8833c.firebaseapp.com",
projectId: "website-8833c",
storageBucket: "website-8833c.firebasestorage.app",
messagingSenderId: "831801957212",
appId: "1:831801957212:web:707b3c8ac71fb67212bf99"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

// Toast
function showToast(msg){
const t=document.getElementById("toast");
t.innerText=msg;
t.classList.add("show");
setTimeout(()=>t.classList.remove("show"),3000);
}

// UI Switch
window.showRegister=()=>{
loginBox.classList.add("hidden");
registerBox.classList.remove("hidden");
}

window.showLogin=()=>{
registerBox.classList.add("hidden");
loginBox.classList.remove("hidden");
}

// Register
window.register=async()=>{
try{
await createUserWithEmailAndPassword(auth,regEmail.value,regPass.value);
showToast("تم إنشاء الحساب 🎉");
showLogin();
}catch(e){showToast(e.message)}
}

// Login
window.login=async()=>{
try{
await signInWithEmailAndPassword(auth,logEmail.value,logPass.value);
showToast("تم تسجيل الدخول ✅");
}catch(e){showToast(e.message)}
}

// Logout
window.logout=()=>signOut(auth);

// Auth State
onAuthStateChanged(auth,(user)=>{
if(user){
authDiv.classList.add("hidden");
dashboard.classList.remove("hidden");
navUser.classList.remove("hidden");
userEmail.innerText=user.email;
}else{
authDiv.classList.remove("hidden");
dashboard.classList.add("hidden");
navUser.classList.add("hidden");
coursePage.classList.add("hidden");
}
});

// Courses
const htmlCourse="<h2>HTML</h2>"+ "<p>تعلم HTML</p>".repeat(200);
const cssCourse="<h2>CSS</h2>"+ "<p>تعلم CSS</p>".repeat(200);
const jsCourse="<h2>JS</h2>"+ "<p>تعلم JS</p>".repeat(200);

// Open Course
window.openCourse=(t)=>{
if(!auth.currentUser){
showToast("سجل دخول أول 🔒");
return;
}

dashboard.classList.add("hidden");
coursePage.classList.remove("hidden");

if(t==="html") courseContent.innerHTML=htmlCourse;
if(t==="css") courseContent.innerHTML=cssCourse;
if(t==="js") courseContent.innerHTML=jsCourse;
}

// Back
window.back=()=>{
coursePage.classList.add("hidden");
dashboard.classList.remove("hidden");
}

</script>

</body>
</html>
