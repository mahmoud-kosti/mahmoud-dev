<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>HOota O Black Academy</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Cairo', sans-serif;
  background:linear-gradient(180deg,#05070d,#0b0f1a);
  color:#eaeaea;
}

/* ===== Navbar ===== */
nav{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  background:rgba(0,0,0,0.9);
  padding:15px 30px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  z-index:999;
}

.brand{
  font-size:26px;
  font-weight:800;
  background:linear-gradient(90deg,#f5c16c,#00cfff);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

nav a{
  color:#ddd;
  margin:0 12px;
  cursor:pointer;
  font-size:18px;
  font-weight:600;
  text-decoration:none;
}

nav a:hover{color:#00cfff}

/* ===== Containers ===== */
.container{
  padding:120px 25px 40px;
}

.hidden{display:none}

/* ===== Buttons ===== */
.btn{
  background:linear-gradient(90deg,#f5c16c,#ff9f1c);
  border:none;
  padding:14px 30px;
  border-radius:30px;
  font-size:18px;
  font-weight:700;
  cursor:pointer;
}

/* ===== Grid ===== */
.grid{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
}

.card{
  background:#0e1322;
  border:1px solid #1f2933;
  border-radius:16px;
  padding:25px;
  margin:15px;
  width:260px;
  cursor:pointer;
  text-align:center;
  font-size:18px;
}

.card:hover{
  color:#00cfff;
  box-shadow:0 0 25px rgba(0,207,255,0.4);
}

/* ===== Lesson ===== */
.lesson-box{
  background:#0e1322;
  border-radius:18px;
  padding:30px;
  border:1px solid #1f2933;
  line-height:2;
  font-size:18px;
}

.lesson-box h3{color:#f5c16c}
.lesson-box h4{color:#00cfff}

/* ===== Footer ===== */
footer{
  background:#000;
  text-align:center;
  padding:20px;
  margin-top:60px;
  color:#777;
}
</style>
</head>

<body>

<nav>
  <div class="brand">HOota O Black</div>
  <div>
    <a onclick="showHome()">الرئيسية</a>
    <a onclick="showCourse()">الكورس</a>
    <a href="https://www.youtube.com/channel/UCDHo57HZnBCwPB0215yQXlA" target="_blank">يوتيوب</a>
  </div>
</nav>

<!-- الصفحة الرئيسية -->
<div id="home" class="container">
  <h1>تعلم إنشاء المواقع من الصفر</h1>
  <p>كورس عربي متكامل لتعلم HTML و CSS و JavaScript</p>
  <button class="btn" onclick="showCourse()">ابدأ التعلم</button>
</div>

<!-- صفحة الكورس -->
<div id="course" class="container hidden">
  <h2>كورس HTML</h2>
  <div class="grid">
    <div class="card" onclick="openHTMLLesson(0)">الدرس 1 – مقدمة HTML</div>
    <div class="card" onclick="openHTMLLesson(1)">الدرس 2 – الوسوم</div>
    <div class="card" onclick="openHTMLLesson(2)">الدرس 3 – هيكل الصفحة</div>
    <div class="card" onclick="openHTMLLesson(3)">الدرس 4 – أشهر الوسوم</div>
    <div class="card" onclick="openHTMLLesson(4)">الدرس 5 – المميزات والعيوب</div>
    <div class="card" onclick="openHTMLLesson(5)">الدرس 6 – مقارنة اللغات</div>
  </div>
</div>

<!-- صفحة الدرس -->
<div id="lesson" class="container hidden">
  <div class="lesson-box">
    <h2 id="lessonTitle"></h2>
    <div id="lessonContent"></div>
  </div>

  <div style="margin-top:25px; display:flex; gap:15px; flex-wrap:wrap;">
    <button class="btn" onclick="prevHTML()">⬅ السابق</button>
    <button class="btn" onclick="nextHTML()">➡ التالي</button>
    <button class="btn" onclick="showCourse()">📚 الكورس</button>
  </div>
</div>

<footer>
© 2025 HOota O Black Academy
</footer>

<script>
const lessons = {
  html: [
    {
      title:"مقدمة HTML",
      content:`<h3>ما هي HTML؟</h3><p>HTML هي لغة ترميز تُستخدم لبناء الهيكل الأساسي لصفحات الويب...</p>`
    },
    {
      title:"الوسوم",
      content:`<h3>ما هي الوسوم؟</h3><p>الوسم هو كلمة محاطة بعلامتي &lt; &gt;...</p>`
    },
    {
      title:"هيكل الصفحة",
      content:`<h3>الهيكل الأساسي</h3><p>كل صفحة HTML تحتوي على html و head و body...</p>`
    },
    {
      title:"أشهر الوسوم",
      content:`<h3>العناوين والروابط</h3><p>من h1 إلى h6...</p>`
    },
    {
      title:"المميزات والعيوب",
      content:`<h3>مميزات HTML</h3><ul><li>سهلة</li></ul>`
    },
    {
      title:"مقارنة اللغات",
      content:`<h3>HTML vs CSS vs JS</h3><p>كل لغة لها دور...</p>`
    }
  ]
};

let currentHTMLLesson = 0;

function hideAll(){
  home.classList.add("hidden");
  course.classList.add("hidden");
  lesson.classList.add("hidden");
}

function showHome(){hideAll(); home.classList.remove("hidden")}
function showCourse(){hideAll(); course.classList.remove("hidden")}

function openHTMLLesson(i){
  currentHTMLLesson=i;
  lessonTitle.innerText=lessons.html[i].title;
  lessonContent.innerHTML=lessons.html[i].content;
  hideAll(); lesson.classList.remove("hidden");
}

function nextHTML(){
  if(currentHTMLLesson < lessons.html.length-1)
    openHTMLLesson(currentHTMLLesson+1);
}

function prevHTML(){
  if(currentHTMLLesson>0)
    openHTMLLesson(currentHTMLLesson-1);
}
</script>

</body>
</html>
