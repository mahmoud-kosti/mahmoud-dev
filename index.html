<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>HOota Academy</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#020617;
  --card:#0f172a;
  --text:#fff;
  --main:#00cfff;
}

body.light{
  --bg:#f1f5f9;
  --card:#ffffff;
  --text:#000;
  --main:#2563eb;
}

body{
  margin:0;
  font-family:'Cairo', sans-serif;
  background:var(--bg);
  color:var(--text);
  transition:0.3s;
}

/* NAV */
nav{
  display:flex;
  justify-content:space-between;
  padding:12px 18px;
  background:var(--bg);
  border-bottom:1px solid #222;
}

.logo{
  color:var(--main);
  font-weight:900;
}

/* AUTH */
.center{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
}

.box{
  width:340px;
  padding:30px;
  border-radius:15px;
  background:var(--card);
  box-shadow:0 10px 30px rgba(0,0,0,0.4);
  text-align:center;
  animation:fade .3s;
}

input{
  width:100%;
  padding:10px;
  margin:8px 0;
  border-radius:10px;
  border:none;
  background:#1e293b;
  color:#fff;
  outline:none;
}

body.light input{
  background:#e2e8f0;
  color:#000;
}

.main-btn{
  width:100%;
  padding:10px;
  background:var(--main);
  border:none;
  border-radius:10px;
  font-weight:bold;
  cursor:pointer;
}

.link{
  color:var(--main);
  cursor:pointer;
  margin-top:10px;
}

/* DASHBOARD */
.dashboard{
  display:none;
  padding:20px;
}

/* TOAST */
.toast{
  position:fixed;
  top:20px;
  right:20px;
  background:#111827;
  padding:10px 14px;
  border-radius:10px;
  opacity:0;
  transform:translateY(-10px);
  transition:0.3s;
}

.toast.show{
  opacity:1;
  transform:translateY(0);
}

/* ANIMATION */
@keyframes fade{
  from{opacity:0;transform:translateY(10px)}
  to{opacity:1;transform:translateY(0)}
}

/* BUTTONS */
.top-btns{
  display:flex;
  gap:10px;
  align-items:center;
}

.small-btn{
  padding:6px 10px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  font-size:12px;
}

.logout{background:#ef4444;color:#fff}
.theme{background:var(--main);color:#000}

</style>
</head>

<body>

<div id="toast" class="toast"></div>

<nav>
<div class="logo">HOota Academy</div>

<div class="top-btns">
<button class="small-btn theme" onclick="toggleTheme()">🌙</button>
</div>
</nav>

<!-- AUTH -->
<div id="auth" class="center">
<div class="box">

<div id="loginBox">
<h3>تسجيل الدخول</h3>
<input id="logEmail" placeholder="Email">
<input id="logPass" type="password" placeholder="Password">
<button class="main-btn" onclick="login()">دخول</button>
<p class="link" onclick="toggleForm()">إنشاء حساب</p>
</div>

<div id="registerBox" style="display:none">
<h3>إنشاء حساب</h3>
<input id="regEmail" placeholder="Email">
<input id="regPass" type="password" placeholder="Password">
<input id="regPass2" type="password" placeholder="Confirm Password">
<button class="main-btn" onclick="register()">إنشاء</button>
<p class="link" onclick="toggleForm()">رجوع</p>
</div>

</div>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="dashboard">
<h2>🎓 الكورسات</h2>
<button class="small-btn logout" onclick="logout()">خروج</button>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
getAuth,
createUserWithEmailAndPassword,
signInWithEmailAndPassword,
onAuthStateChanged,
signOut
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const app = initializeApp({
apiKey:"YOUR_API_KEY",
authDomain:"YOUR_AUTH_DOMAIN",
projectId:"YOUR_PROJECT_ID"
});

const auth = getAuth(app);

/* TOAST */
function toast(msg){
const t=document.getElementById("toast");
t.innerText=msg;
t.classList.add("show");
setTimeout(()=>t.classList.remove("show"),2500);
}

/* LOGIN */
window.login=async()=>{
try{
if(!logEmail.value || !logPass.value){
toast("املأ كل الحقول");
return;
}

await signInWithEmailAndPassword(auth,logEmail.value,logPass.value);
toast("تم تسجيل الدخول بنجاح");

}catch(e){
toast("خطأ: تأكد من البيانات أو كلمة المرور يجب أن تكون 6 أحرف+");
}
}

/* REGISTER */
window.register=async()=>{
try{
if(regPass.value !== regPass2.value){
toast("كلمات المرور غير متطابقة");
return;
}

if(regPass.value.length < 6){
toast("كلمة المرور يجب أن تكون 6 أحرف أو أكثر");
return;
}

await createUserWithEmailAndPassword(auth,regEmail.value,regPass.value);
toast("تم إنشاء الحساب بنجاح");

}catch(e){
toast("فشل إنشاء الحساب (الإيميل قد يكون مستخدم)");
}
}

/* AUTH STATE */
onAuthStateChanged(auth,(user)=>{
if(user){
authDiv.style.display="none";
dashboard.style.display="block";
}else{
authDiv.style.display="flex";
dashboard.style.display="none";
}
});

/* FORM TOGGLE */
window.toggleForm=()=>{
loginBox.style.display=
loginBox.style.display==="none"?"block":"none";

registerBox.style.display=
registerBox.style.display==="none"?"block":"none";
}

/* LOGOUT */
window.logout=()=>signOut(auth);

/* DARK MODE */
window.toggleTheme=()=>{
document.body.classList.toggle("light");
}

</script>

</body>
</html>
