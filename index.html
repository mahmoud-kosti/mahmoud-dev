<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>HOota Academy</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;800&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Cairo', sans-serif;
  background:#0b0f1a;
  color:#fff;
}

nav{
  display:flex;
  justify-content:space-between;
  padding:15px 25px;
  background:#020617;
}

.logo{color:#00cfff;font-weight:800}

.container{padding:100px 20px;text-align:center}

/* AUTH BOX */
.auth-box{
  background:#111827;
  padding:25px;
  border-radius:15px;
  max-width:350px;
  margin:auto;
  transition:0.4s;
}

input{
  width:100%;
  padding:12px;
  margin:10px 0;
  border:none;
  border-radius:10px;
}

.btn{
  background:#00cfff;
  color:#000;
  padding:12px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  font-weight:bold;
  width:100%;
}

.link{
  margin-top:15px;
  color:#00cfff;
  cursor:pointer;
  display:block;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
}

.card{
  background:#111827;
  padding:20px;
  border-radius:15px;
  cursor:pointer;
  transition:0.3s;
}

.card:hover{
  transform:translateY(-5px);
  border:1px solid #00cfff;
}

/* NOTIFICATION */
.toast{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#00cfff;
  color:#000;
  padding:15px 25px;
  border-radius:10px;
  opacity:0;
  transform:translateY(50px);
  transition:0.4s;
}

.toast.show{
  opacity:1;
  transform:translateY(0);
}

.hidden{display:none}
</style>
</head>

<body>

<nav>
  <div class="logo">HOota Academy</div>
  <div id="navUser" class="hidden">
    <span id="userEmail"></span>
    <button class="btn" onclick="logout()">خروج</button>
  </div>
</nav>

<!-- AUTH -->
<div id="auth" class="container">

  <div class="auth-box">

    <!-- LOGIN -->
    <div id="loginBox">
      <h2>تسجيل الدخول</h2>
      <input id="logEmail" placeholder="الإيميل">
      <input id="logPass" type="password" placeholder="كلمة المرور">
      <button class="btn" onclick="login()">دخول</button>

      <span class="link" onclick="showRegister()">إنشاء حساب</span>
    </div>

    <!-- REGISTER -->
    <div id="registerBox" class="hidden">
      <h2>إنشاء حساب</h2>
      <input id="regName" placeholder="الاسم">
      <input id="regEmail" placeholder="الإيميل">
      <input id="regPass" type="password" placeholder="كلمة المرور">
      <button class="btn" onclick="register()">إنشاء</button>

      <span class="link" onclick="showLogin()">رجوع لتسجيل الدخول</span>
    </div>

  </div>

</div>

<!-- DASHBOARD -->
<div id="dashboard" class="container hidden">
<h2>🎓 الكورسات</h2>

<div class="grid">

<div class="card" onclick="openCourse('html')">
<h3>HTML</h3>
<p>تعلم بناء المواقع</p>
</div>

<div class="card" onclick="openCourse('css')">
<h3>CSS</h3>
<p>تصميم احترافي</p>
</div>

<div class="card" onclick="openCourse('js')">
<h3>JavaScript</h3>
<p>برمجة المواقع</p>
</div>

</div>
</div>

<!-- COURSE -->
<div id="coursePage" class="container hidden">
<div id="courseContent"></div>
<button class="btn" onclick="back()">رجوع</button>
</div>

<!-- NOTIFICATION -->
<div id="toast" class="toast"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
  getAuth,
  createUserWithEmailAndPassword,
  signInWithEmailAndPassword,
  onAuthStateChanged,
  signOut
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyBsvF9J_DneR5H0JbOW4HX_JjVWaajAUgk",
  authDomain: "website-8833c.firebaseapp.com",
  projectId: "website-8833c",
  storageBucket: "website-8833c.firebasestorage.app",
  messagingSenderId: "831801957212",
  appId: "1:831801957212:web:707b3c8ac71fb67212bf99"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

// 🔔 Toast
function showToast(msg){
  const t = document.getElementById("toast");
  t.innerText = msg;
  t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"),3000);
}

// Switch UI
window.showRegister = ()=>{
  loginBox.classList.add("hidden");
  registerBox.classList.remove("hidden");
}

window.showLogin = ()=>{
  registerBox.classList.add("hidden");
  loginBox.classList.remove("hidden");
}

// Register
window.register = async ()=>{
  try{
    await createUserWithEmailAndPassword(auth, regEmail.value, regPass.value);
    showToast("تم إنشاء الحساب 🎉");
    showLogin();
  }catch(e){ showToast(e.message); }
};

// Login
window.login = async ()=>{
  try{
    await signInWithEmailAndPassword(auth, logEmail.value, logPass.value);
    showToast("تم تسجيل الدخول ✅");
  }catch(e){ showToast(e.message); }
};

// Logout
window.logout = ()=> signOut(auth);

// Auth State (PROTECTION)
onAuthStateChanged(auth,(user)=>{

  if(user){
    auth.classList.add("hidden");
    dashboard.classList.remove("hidden");
    navUser.classList.remove("hidden");
    userEmail.innerText=user.email;
  }else{
    auth.classList.remove("hidden");
    dashboard.classList.add("hidden");
    navUser.classList.add("hidden");
    coursePage.classList.add("hidden");
  }

});

// Courses
const htmlCourse = "<h2>HTML</h2>" + "<p>تعلم HTML</p>".repeat(200);
const cssCourse = "<h2>CSS</h2>" + "<p>تعلم CSS</p>".repeat(200);
const jsCourse = "<h2>JS</h2>" + "<p>تعلم JS</p>".repeat(200);

window.openCourse = (t)=>{
  if(!auth.currentUser){
    showToast("يجب تسجيل الدخول أولاً 🔒");
    return;
  }

  dashboard.classList.add("hidden");
  coursePage.classList.remove("hidden");

  if(t==="html") courseContent.innerHTML=htmlCourse;
  if(t==="css") courseContent.innerHTML=cssCourse;
  if(t==="js") courseContent.innerHTML=jsCourse;
}

window.back = ()=>{
  coursePage.classList.add("hidden");
  dashboard.classList.remove("hidden");
}

</script>

</body>
</html>
