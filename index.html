<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>HOota Academy</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Cairo', sans-serif;
  background:#1c1c1c;
  color:#e5e5e5;
}

/* AUTH */
.center{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
}

.auth-box{
  width:360px;
  padding:40px;
  border-radius:25px;
  background:rgba(255,255,255,0.03);
  border:1px solid rgba(255,255,255,0.05);
  text-align:center;
}

input{
  width:100%;
  padding:14px;
  margin:10px 0;
  border:none;
  border-radius:30px;
  background:#2a2a2a;
  color:#fff;
  font-size:15px;
}

.btn{
  width:100%;
  padding:14px;
  border:none;
  border-radius:30px;
  background:#b8a99a;
  color:#000;
  font-weight:bold;
  cursor:pointer;
  transition:0.3s;
}

.btn:hover{
  background:#d1c2b3;
}

.link{
  margin-top:10px;
  cursor:pointer;
  color:#b8a99a;
}

/* brand */
.brand{
  margin-top:25px;
  font-size:28px;
  font-weight:900;
  color:#b8a99a;
}

/* DASHBOARD */
.dashboard{
  display:none;
  padding:25px;
}

.topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.logout{
  background:#444;
  color:#fff;
  border:none;
  padding:10px 20px;
  border-radius:20px;
  cursor:pointer;
}

/* COURSES GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
  gap:25px;
  margin-top:30px;
}

/* CARD */
.card{
  background:#2a2a2a;
  padding:30px;
  border-radius:20px;
  transition:0.3s;
  box-shadow:0 10px 25px rgba(0,0,0,0.5);
}

.card:hover{
  transform:translateY(-5px);
  box-shadow:0 20px 40px rgba(0,0,0,0.8);
}

.card h3{
  font-size:22px;
  color:#b8a99a;
}

.card p{
  font-size:15px;
  opacity:0.8;
}

.card button{
  margin-top:15px;
  padding:12px;
  width:100%;
  border:none;
  border-radius:15px;
  background:#b8a99a;
  color:#000;
  font-weight:bold;
  cursor:pointer;
}

/* COURSE PAGE */
.course{
  display:none;
  padding:30px;
  max-width:900px;
  margin:auto;
}

.back{
  border:1px solid #b8a99a;
  color:#b8a99a;
  padding:10px 20px;
  border-radius:20px;
  cursor:pointer;
  margin-bottom:20px;
}

.footer{
  margin-top:30px;
  text-align:center;
  opacity:0.7;
}
</style>
</head>

<body>

<!-- AUTH -->
<div id="auth" class="center">
<div class="auth-box">

<div id="loginBox">
<h2>Login</h2>
<input id="logEmail" placeholder="Email">
<input id="logPass" type="password" placeholder="Password">
<button class="btn" onclick="login()">Login</button>
<p class="link" onclick="showRegister()">إنشاء حساب</p>
</div>

<div id="registerBox" style="display:none">
<h2>Register</h2>
<input id="regEmail" placeholder="Email">
<input id="regPass" type="password" placeholder="Password">
<input id="regPass2" type="password" placeholder="Confirm Password">
<button class="btn" onclick="register()">Create</button>
<p class="link" onclick="showLogin()">رجوع</p>
</div>

<div class="brand">حووته</div>

</div>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="dashboard">

<div class="topbar">
<h2>🎓 الكورسات</h2>
<button class="logout" onclick="logout()">خروج</button>
</div>

<div class="grid">

<div class="card">
<h3>📘 HTML</h3>
<p>تعلم أساسيات بناء المواقع</p>
<button onclick="openCourse('html')">ابدأ الكورس</button>
</div>

<div class="card">
<h3>🎨 CSS</h3>
<p>تصميم احترافي للمواقع</p>
<button onclick="openCourse('css')">ابدأ الكورس</button>
</div>

<div class="card">
<h3>⚡ JavaScript</h3>
<p>برمجة تفاعلية للمواقع</p>
<button onclick="openCourse('js')">ابدأ الكورس</button>
</div>

</div>
</div>

<!-- COURSE -->
<div id="course" class="course">
<button class="back" onclick="back()">⬅ رجوع</button>
<div id="content"></div>

<div class="footer">
© Mahmoud Abdallah  
<br><br>
<a href="https://wa.me/249900623733" target="_blank">
<button class="btn">📞 واتساب</button>
</a>
</div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
getAuth,
createUserWithEmailAndPassword,
signInWithEmailAndPassword,
onAuthStateChanged,
signOut
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const app = initializeApp({
apiKey:"AIzaSyBsvF9J_DneR5H0JbOW4HX_JjVWaajAUgk",
authDomain:"website-8833c.firebaseapp.com",
projectId:"website-8833c"
});

const auth = getAuth(app);

const authDiv = document.getElementById("auth");
const dashboardDiv = document.getElementById("dashboard");
const courseDiv = document.getElementById("course");
const contentDiv = document.getElementById("content");

window.showRegister=()=>{loginBox.style.display="none";registerBox.style.display="block";}
window.showLogin=()=>{registerBox.style.display="none";loginBox.style.display="block";}

window.register=async()=>{
if(regPass.value !== regPass2.value){
alert("كلمة المرور غير متطابقة");
return;
}
await createUserWithEmailAndPassword(auth,regEmail.value,regPass.value);
}

window.login=async()=>{
await signInWithEmailAndPassword(auth,logEmail.value,logPass.value);
}

window.logout=async()=>{await signOut(auth);}

onAuthStateChanged(auth,(user)=>{
if(user){
authDiv.style.display="none";
dashboardDiv.style.display="block";
}else{
authDiv.style.display="flex";
dashboardDiv.style.display="none";
courseDiv.style.display="none";
}
});

const courses = {
html:"<h2>HTML</h2><p>تعلم الأساسيات</p>".repeat(40),
css:"<h2>CSS</h2><p>تصميم المواقع</p>".repeat(40),
js:"<h2>JavaScript</h2><p>برمجة المواقع</p>".repeat(40)
};

window.openCourse=(name)=>{
dashboardDiv.style.display="none";
courseDiv.style.display="block";
contentDiv.innerHTML=courses[name];
}

window.back=()=>{
courseDiv.style.display="none";
dashboardDiv.style.display="block";
}

</script>

</body>
</html>
