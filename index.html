<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>HOota O Black Academy</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Cairo', sans-serif;
  background:#0b0f1a;
  color:#fff;
}

nav{
  display:flex;
  justify-content:space-between;
  padding:15px 25px;
  background:#020617;
  border-bottom:1px solid #111;
}

.logo{
  font-weight:800;
  color:#00cfff;
}

.container{
  padding:100px 20px;
  text-align:center;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
  margin-top:30px;
}

.card{
  background:#111827;
  padding:20px;
  border-radius:15px;
  transition:0.3s;
  cursor:pointer;
  border:1px solid transparent;
}

.card:hover{
  transform:translateY(-5px);
  border:1px solid #00cfff;
}

.card h3{
  color:#00cfff;
}

.btn{
  background:#00cfff;
  color:#000;
  padding:10px 20px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  font-weight:bold;
  margin-top:10px;
}

input{
  width:90%;
  padding:12px;
  margin:10px;
  border-radius:10px;
  border:none;
}

.course-page{
  max-width:900px;
  margin:auto;
  text-align:right;
  line-height:1.8;
}

.hidden{display:none}
</style>
</head>

<body>

<nav>
  <div class="logo">HOota Academy</div>
  <div id="navUser" class="hidden">
    <span id="userEmail"></span>
    <button class="btn" onclick="logout()">خروج</button>
  </div>
</nav>

<!-- AUTH -->
<div id="auth" class="container">

  <h2>تسجيل / دخول</h2>

  <div class="card">
    <h3>إنشاء حساب</h3>
    <input id="regName" placeholder="الاسم">
    <input id="regEmail" placeholder="الإيميل">
    <input id="regPass" type="password" placeholder="كلمة المرور">
    <button class="btn" onclick="register()">تسجيل</button>
  </div>

  <div class="card">
    <h3>تسجيل الدخول</h3>
    <input id="logEmail" placeholder="الإيميل">
    <input id="logPass" type="password" placeholder="كلمة المرور">
    <button class="btn" onclick="login()">دخول</button>
    <br>
    <button class="btn" onclick="resetPassword()">نسيت كلمة المرور؟</button>
  </div>

</div>

<!-- DASHBOARD -->
<div id="dashboard" class="container hidden">
<h2>🎓 الكورسات المتاحة</h2>

<div class="grid">

  <div class="card" onclick="openCourse('html')">
    <h3>HTML</h3>
    <p>تعلم أساسيات بناء المواقع</p>
  </div>

  <div class="card" onclick="openCourse('css')">
    <h3>CSS</h3>
    <p>تصميم مواقع احترافية</p>
  </div>

  <div class="card" onclick="openCourse('js')">
    <h3>JavaScript</h3>
    <p>إضافة التفاعل للموقع</p>
  </div>

</div>
</div>

<!-- COURSE PAGE -->
<div id="coursePage" class="container hidden">
  <div class="course-page" id="courseContent"></div>
  <button class="btn" onclick="back()">رجوع</button>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
  getAuth,
  createUserWithEmailAndPassword,
  signInWithEmailAndPassword,
  onAuthStateChanged,
  signOut,
  sendPasswordResetEmail
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

import {
  getFirestore,
  setDoc,
  doc
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBsvF9J_DneR5H0JbOW4HX_JjVWaajAUgk",
  authDomain: "website-8833c.firebaseapp.com",
  projectId: "website-8833c",
  storageBucket: "website-8833c.firebasestorage.app",
  messagingSenderId: "831801957212",
  appId: "1:831801957212:web:707b3c8ac71fb67212bf99"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// Register
window.register = async function(){
  try{
    const user = await createUserWithEmailAndPassword(auth, regEmail.value, regPass.value);
    await setDoc(doc(db,"users", user.user.uid),{
      name: regName.value,
      email: regEmail.value
    });
    alert("تم إنشاء الحساب");
  }catch(e){ alert(e.message); }
};

// Login
window.login = async function(){
  try{
    await signInWithEmailAndPassword(auth, logEmail.value, logPass.value);
  }catch(e){ alert(e.message); }
};

// Reset
window.resetPassword = async function(){
  try{
    await sendPasswordResetEmail(auth, logEmail.value);
    alert("تم إرسال الرابط");
  }catch(e){ alert(e.message); }
};

// Logout
window.logout = async function(){
  await signOut(auth);
};

// Auth State
onAuthStateChanged(auth,(user)=>{
  if(user){
    authDiv.style.display="none";
    dashboard.style.display="block";
    navUser.classList.remove("hidden");
    userEmail.innerText=user.email;
  }else{
    authDiv.style.display="block";
    dashboard.style.display="none";
    navUser.classList.add("hidden");
  }
});

// Courses Content
const htmlCourse = "<h2>HTML Course</h2>" + "<p>تعلم HTML خطوة بخطوة</p>".repeat(200);
const cssCourse = "<h2>CSS Course</h2>" + "<p>تعلم CSS و التصميم</p>".repeat(200);
const jsCourse = "<h2>JS Course</h2>" + "<p>تعلم JavaScript</p>".repeat(200);

// Open Course
window.openCourse = function(type){
  dashboard.style.display="none";
  coursePage.style.display="block";

  if(type==="html") courseContent.innerHTML=htmlCourse;
  if(type==="css") courseContent.innerHTML=cssCourse;
  if(type==="js") courseContent.innerHTML=jsCourse;
};

// Back
window.back = function(){
  coursePage.style.display="none";
  dashboard.style.display="block";
};

</script>

</body>
</html>
