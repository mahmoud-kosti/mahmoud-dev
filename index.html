<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>HOota Academy</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;800&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Cairo', sans-serif;
  background: linear-gradient(180deg,#3b0a6d,#0b0f1a);
  color:#fff;
}

/* logo */
.logo{
  text-align:center;
  font-size:22px;
  font-weight:800;
  padding:20px;
  background:linear-gradient(90deg,#fff,#00cfff);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

/* auth */
.auth-box{
  max-width:350px;
  margin:100px auto;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(20px);
  padding:30px;
  border-radius:20px;
  text-align:center;
}

input{
  width:100%;
  padding:12px;
  margin:8px 0;
  border:none;
  border-radius:20px;
  background:rgba(255,255,255,0.1);
  color:#fff;
}

.btn{
  width:100%;
  padding:12px;
  border:none;
  border-radius:20px;
  background:#00cfff;
  color:#000;
  font-weight:bold;
  cursor:pointer;
  margin-top:10px;
}

.link{cursor:pointer;margin-top:10px}

/* dashboard */
.dashboard{
  display:none;
  padding:20px;
}

.top-bar{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.logout-btn{
  background:#ff4d4d;
  color:#fff;
  border:none;
  padding:10px 15px;
  border-radius:15px;
  cursor:pointer;
}

/* courses */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
  margin-top:30px;
}

.card{
  background:#111827;
  padding:20px;
  border-radius:15px;
  box-shadow:0 0 15px rgba(0,0,0,0.4);
  transition:0.3s;
}

.card:hover{
  transform:translateY(-5px);
  border:1px solid #00cfff;
}

.card h3{color:#00cfff}

.card button{
  margin-top:10px;
  background:#00cfff;
  border:none;
  padding:10px;
  border-radius:15px;
  cursor:pointer;
}

/* course page */
.course{
  display:none;
  padding:20px;
  max-width:900px;
  margin:auto;
}

.back-btn{
  border:1px solid #00cfff;
  color:#00cfff;
  padding:10px 20px;
  border-radius:20px;
  cursor:pointer;
  margin-bottom:20px;
}
</style>
</head>

<body>

<div class="logo">HOota Academy</div>

<!-- AUTH -->
<div id="auth">
<div class="auth-box">

<div id="loginBox">
<h2>Login</h2>
<input id="logEmail" placeholder="Email">
<input id="logPass" type="password" placeholder="Password">
<button class="btn" onclick="login()">Login</button>
<p class="link" onclick="showRegister()">Register</p>
</div>

<div id="registerBox" style="display:none">
<h2>Register</h2>
<input id="regEmail" placeholder="Email">
<input id="regPass" type="password" placeholder="Password">
<input id="regPass2" type="password" placeholder="Confirm Password">
<button class="btn" onclick="register()">Create</button>
<p class="link" onclick="showLogin()">Back</p>
</div>

</div>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="dashboard">

<div class="top-bar">
<h2>🎓 الكورسات</h2>
<button class="logout-btn" onclick="logout()">تسجيل خروج</button>
</div>

<div class="grid">

<div class="card">
<h3>HTML</h3>
<p>تعلم أساسيات بناء المواقع</p>
<button onclick="openCourse('html')">دخول الكورس</button>
</div>

<div class="card">
<h3>CSS</h3>
<p>تصميم احترافي للمواقع</p>
<button onclick="openCourse('css')">دخول الكورس</button>
</div>

<div class="card">
<h3>JavaScript</h3>
<p>إضافة التفاعل للمواقع</p>
<button onclick="openCourse('js')">دخول الكورس</button>
</div>

</div>
</div>

<!-- COURSE -->
<div id="course" class="course">

<button class="back-btn" onclick="back()">⬅ رجوع</button>

<div id="content"></div>

<hr>
<p>© جميع الحقوق محفوظة - Mahmoud Abdallah</p>

<a href="https://wa.me/249900623733" target="_blank">
<button class="btn">📞 واتساب</button>
</a>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
getAuth,
createUserWithEmailAndPassword,
signInWithEmailAndPassword,
onAuthStateChanged,
signOut
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const firebaseConfig = {
apiKey: "AIzaSyBsvF9J_DneR5H0JbOW4HX_JjVWaajAUgk",
authDomain: "website-8833c.firebaseapp.com",
projectId: "website-8833c"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

// 🔥 تعريف العناصر (الحل الأساسي)
const authDiv = document.getElementById("auth");
const dashboardDiv = document.getElementById("dashboard");
const courseDiv = document.getElementById("course");
const contentDiv = document.getElementById("content");

// switch
window.showRegister=()=>{loginBox.style.display="none";registerBox.style.display="block";}
window.showLogin=()=>{registerBox.style.display="none";loginBox.style.display="block";}

// register
window.register=async()=>{
if(regPass.value !== regPass2.value){
alert("كلمة المرور غير متطابقة");
return;
}
await createUserWithEmailAndPassword(auth,regEmail.value,regPass.value);
}

// login
window.login=async()=>{
await signInWithEmailAndPassword(auth,logEmail.value,logPass.value);
}

// logout (FIX 🔥)
window.logout=async()=>{
await signOut(auth);
}

// auth state (FIX 🔥)
onAuthStateChanged(auth,(user)=>{
if(user){
authDiv.style.display="none";
dashboardDiv.style.display="block";
}else{
authDiv.style.display="block";
dashboardDiv.style.display="none";
courseDiv.style.display="none";
}
});

// courses
const courses = {
html:"<h2>HTML</h2><p>تعلم الأساسيات</p>".repeat(30),
css:"<h2>CSS</h2><p>تصميم المواقع</p>".repeat(30),
js:"<h2>JS</h2><p>برمجة المواقع</p>".repeat(30)
};

// open course (FIX 🔥)
window.openCourse=(name)=>{
dashboardDiv.style.display="none";
courseDiv.style.display="block";
contentDiv.innerHTML=courses[name];
}

// back (FIX 🔥)
window.back=()=>{
courseDiv.style.display="none";
dashboardDiv.style.display="block";
}

</script>

</body>
</html>
