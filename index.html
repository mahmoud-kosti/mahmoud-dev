<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>HOota O Black Academy</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Cairo', sans-serif;
  background: linear-gradient(180deg,#05070d,#0b0f1a);
  color:#eaeaea;
}

.container{padding:100px 20px; text-align:center}

.hidden{display:none}

input{
  width:90%;
  padding:12px;
  margin:10px;
  border-radius:10px;
  border:none;
}

.btn{
  background:#00cfff;
  color:#000;
  padding:12px 25px;
  border:none;
  border-radius:20px;
  font-weight:bold;
  cursor:pointer;
  margin:5px;
}

.card{
  background:#0e1322;
  padding:20px;
  margin:10px auto;
  width:300px;
  border-radius:15px;
}

nav{
  display:flex;
  justify-content:space-between;
  padding:15px;
  background:#000;
}

a{color:#fff; cursor:pointer}
</style>
</head>

<body>

<nav>
  <div>HOota Academy</div>
  <div id="navUser" class="hidden">
    <span id="userEmail"></span>
    <button class="btn" onclick="logout()">خروج</button>
  </div>
</nav>

<!-- LOGIN / REGISTER -->
<div id="auth" class="container">

  <h2>تسجيل / دخول</h2>

  <div class="card">
    <h3>إنشاء حساب</h3>
    <input id="regName" placeholder="الاسم">
    <input id="regEmail" placeholder="الإيميل">
    <input id="regPhone" placeholder="رقم الهاتف">
    <input id="regPass" type="password" placeholder="كلمة المرور">
    <button class="btn" onclick="register()">تسجيل</button>
  </div>

  <div class="card">
    <h3>تسجيل الدخول</h3>
    <input id="logEmail" placeholder="الإيميل">
    <input id="logPass" type="password" placeholder="كلمة المرور">
    <button class="btn" onclick="login()">دخول</button>
  </div>

</div>

<!-- DASHBOARD -->
<div id="dashboard" class="container hidden">
  <h2>🎓 لوحة التحكم</h2>

  <p>مرحباً بك في الأكاديمية</p>

  <div class="card">
    <h3>الدروس</h3>
    <p>HTML - CSS - JavaScript</p>
  </div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
  getAuth,
  createUserWithEmailAndPassword,
  signInWithEmailAndPassword,
  onAuthStateChanged,
  signOut
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

import {
  getFirestore,
  setDoc,
  doc,
  getDoc
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";


// 🔥 ضع بيانات Firebase هنا
const firebaseConfig = {
  apiKey: "AIzaSyBsvF9J_DneR5H0JbOW4HX_JjVWaajAUgk",
  authDomain: "website-8833c.firebaseapp.com",
  projectId: "website-8833c",
  storageBucket: "website-8833c.firebasestorage.app",
  messagingSenderId: "YOUR_SENDER_ID",
  appId: "1:831801957212:web:xxxxxxxxxxxx"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);


// 🟢 تسجيل حساب
window.register = async function(){

  const name = regName.value;
  const email = regEmail.value;
  const phone = regPhone.value;
  const pass = regPass.value;

  try{
    const userCred = await createUserWithEmailAndPassword(auth, email, pass);

    await setDoc(doc(db,"users", userCred.user.uid),{
      name, email, phone
    });

    alert("تم إنشاء الحساب ✅");

  }catch(e){
    alert(e.message);
  }
};


// 🟢 تسجيل دخول
window.login = async function(){

  const email = logEmail.value;
  const pass = logPass.value;

  try{
    await signInWithEmailAndPassword(auth, email, pass);
    alert("تم تسجيل الدخول ✅");

  }catch(e){
    alert(e.message);
  }
};


// 🟢 تسجيل خروج
window.logout = async function(){
  await signOut(auth);
};


// 🟢 حالة المستخدم
onAuthStateChanged(auth, async (user)=>{

  if(user){

    document.getElementById("auth").classList.add("hidden");
    document.getElementById("dashboard").classList.remove("hidden");
    document.getElementById("navUser").classList.remove("hidden");

    document.getElementById("userEmail").innerText = user.email;

  }else{

    document.getElementById("auth").classList.remove("hidden");
    document.getElementById("dashboard").classList.add("hidden");
    document.getElementById("navUser").classList.add("hidden");

  }

});

</script>

</body>
</html>
