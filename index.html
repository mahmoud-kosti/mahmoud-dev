<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>HOota Academy</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:'Cairo', sans-serif;
background:#020617;
color:#fff;
}

/* NAV */
nav{
display:flex;
justify-content:space-between;
padding:12px 18px;
background:#0a0f1c;
}

.logo{
color:#00cfff;
font-weight:900;
}

/* HIDE SYSTEM */
.hidden{display:none !important;}

/* AUTH */
.center{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.box{
width:340px;
padding:30px;
border-radius:15px;
background:#0f172a;
text-align:center;
box-shadow:0 10px 30px rgba(0,0,0,0.4);
}

input{
width:100%;
padding:10px;
margin:8px 0;
border-radius:10px;
border:none;
background:#1e293b;
color:#fff;
outline:none;
}

button{
width:100%;
padding:10px;
border:none;
border-radius:10px;
cursor:pointer;
font-weight:bold;
}

.main-btn{
background:#00cfff;
color:#000;
}

.link{
color:#00cfff;
cursor:pointer;
margin-top:10px;
}

/* DASHBOARD */
.dashboard{
display:none;
padding:20px;
}

/* TOAST */
.toast{
position:fixed;
top:20px;
right:20px;
background:#111827;
padding:10px 14px;
border-radius:10px;
opacity:0;
transition:.3s;
}

.toast.show{
opacity:1;
}

/* DARK MODE */
.light{
background:#f1f5f9;
color:#000;
}

.light .box{
background:#fff;
color:#000;
}

.light input{
background:#e2e8f0;
color:#000;
}
</style>
</head>

<body>

<div id="toast" class="toast"></div>

<nav>
<div class="logo">HOota Academy</div>
<button onclick="toggleTheme()">🌙</button>
</nav>

<!-- AUTH -->
<div id="auth" class="center">
<div class="box">

<div id="loginBox">
<h3>تسجيل الدخول</h3>
<input id="logEmail" placeholder="Email">
<input id="logPass" type="password" placeholder="Password">
<button class="main-btn" onclick="login()">دخول</button>
<p class="link" onclick="toggleForm()">إنشاء حساب</p>
</div>

<div id="registerBox" class="hidden">
<h3>إنشاء حساب</h3>
<input id="regEmail" placeholder="Email">
<input id="regPass" type="password" placeholder="Password">
<input id="regPass2" type="password" placeholder="Confirm Password">
<button class="main-btn" onclick="register()">إنشاء</button>
<p class="link" onclick="toggleForm()">رجوع</p>
</div>

</div>
</div>

<!-- DASHBOARD -->
<div id="dashboard">
<h2>🎓 الكورسات</h2>
<button onclick="logout()">خروج</button>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
getAuth,
createUserWithEmailAndPassword,
signInWithEmailAndPassword,
onAuthStateChanged,
signOut
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

/* 🔥 ضع بيانات Firebase الحقيقية هنا */
const firebaseConfig = {
apiKey: "AIzaSyBsvF9J_DneR5H0JbOW4HX_JjVWaajAUgk",
authDomain: "website-8833c.firebaseapp.com",
projectId: "website-8833c"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

const authDiv = document.getElementById("auth");
const dashboard = document.getElementById("dashboard");

/* TOAST */
function toast(msg){
const t=document.getElementById("toast");
t.innerText=msg;
t.classList.add("show");
setTimeout(()=>t.classList.remove("show"),2000);
}

/* LOGIN */
window.login=async()=>{
try{
await signInWithEmailAndPassword(auth,logEmail.value,logPass.value);
toast("تم تسجيل الدخول");
}catch(e){
toast("خطأ في البيانات");
}
}

/* REGISTER */
window.register=async()=>{
if(regPass.value!==regPass2.value){
toast("كلمات المرور غير متطابقة");
return;
}

try{
await createUserWithEmailAndPassword(auth,regEmail.value,regPass.value);
toast("تم إنشاء الحساب");
}catch(e){
toast("فشل إنشاء الحساب");
}
}

/* FIX LOGIN FLOW (المهم جداً) */
onAuthStateChanged(auth,(user)=>{
if(user){
authDiv.classList.add("hidden");
dashboard.style.display="block";
toast("مرحباً " + user.email);
}else{
authDiv.classList.remove("hidden");
dashboard.style.display="none";
}
});

/* FORM TOGGLE */
window.toggleForm=()=>{
loginBox.classList.toggle("hidden");
registerBox.classList.toggle("hidden");
}

/* LOGOUT */
window.logout=()=>signOut(auth);

/* DARK MODE */
window.toggleTheme=()=>{
document.body.classList.toggle("light");
}

</script>

</body>
</html>
