<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>HOota Academy</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;800&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Cairo', sans-serif;
  background:linear-gradient(180deg,#3b0a6d,#0b0f1a);
  color:#fff;
}

/* NAV */
nav{
  display:flex;
  justify-content:space-between;
  padding:15px 25px;
}

.logo{
  font-weight:800;
  font-size:20px;
  background:linear-gradient(90deg,#fff,#00cfff);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

/* AUTH */
.center{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
}

.box{
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(20px);
  padding:30px;
  border-radius:20px;
  width:320px;
  text-align:center;
}

input{
  width:100%;
  padding:12px;
  margin:8px 0;
  border:none;
  border-radius:20px;
  background:rgba(255,255,255,0.1);
  color:#fff;
}

button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:20px;
  margin-top:10px;
  cursor:pointer;
  font-weight:bold;
}

.btn-main{background:#00cfff;color:#000}
.btn-out{background:#ff4d4d;color:#fff}

.link{cursor:pointer;margin-top:10px}

/* DASHBOARD */
.dashboard{
  padding:20px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
  margin-top:20px;
}

.card{
  background:#111827;
  padding:20px;
  border-radius:15px;
  transition:0.3s;
  cursor:pointer;
  box-shadow:0 0 15px rgba(0,0,0,0.4);
}

.card:hover{
  transform:translateY(-5px);
  border:1px solid #00cfff;
}

/* COURSE */
.course{
  padding:20px;
  max-width:900px;
  margin:auto;
}

.back{
  margin-bottom:20px;
  background:transparent;
  border:1px solid #00cfff;
  color:#00cfff;
}

/* footer */
.footer{
  margin-top:30px;
  text-align:center;
  opacity:0.8;
}
</style>
</head>

<body>

<nav>
<div class="logo">HOota Academy</div>
<button id="logoutBtn" class="btn-out" style="display:none">تسجيل خروج</button>
</nav>

<!-- AUTH -->
<div id="auth" class="center">
<div class="box">

<div id="loginBox">
<h3>Login</h3>
<input id="logEmail" placeholder="Email">
<input id="logPass" type="password" placeholder="Password">
<button class="btn-main" onclick="login()">Login</button>
<p class="link" onclick="showRegister()">Create Account</p>
</div>

<div id="registerBox" style="display:none">
<h3>Register</h3>
<input id="regEmail" placeholder="Email">
<input id="regPass" type="password" placeholder="Password">
<input id="regPass2" type="password" placeholder="Confirm Password">
<button class="btn-main" onclick="register()">Register</button>
<p class="link" onclick="showLogin()">Back</p>
</div>

</div>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="dashboard" style="display:none">
<h2>🎓 الكورسات</h2>

<div class="grid">
<div class="card" onclick="openCourse('HTML')">HTML</div>
<div class="card" onclick="openCourse('CSS')">CSS</div>
<div class="card" onclick="openCourse('JS')">JavaScript</div>
</div>
</div>

<!-- COURSE -->
<div id="course" class="course" style="display:none">
<button class="back" onclick="back()">⬅ رجوع</button>
<div id="content"></div>

<div class="footer">
© جميع الحقوق محفوظة - Mahmoud Abdallah  
<br><br>
<a href="https://wa.me/249900623733" target="_blank">
<button class="btn-main">📞 واتساب</button>
</a>
</div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
getAuth,
createUserWithEmailAndPassword,
signInWithEmailAndPassword,
onAuthStateChanged,
signOut
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const firebaseConfig = {
apiKey: "AIzaSyBsvF9J_DneR5H0JbOW4HX_JjVWaajAUgk",
authDomain: "website-8833c.firebaseapp.com",
projectId: "website-8833c"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

// UI switch
window.showRegister=()=>{loginBox.style.display="none";registerBox.style.display="block";}
window.showLogin=()=>{registerBox.style.display="none";loginBox.style.display="block";}

// register
window.register=async()=>{
if(regPass.value !== regPass2.value){
alert("كلمة المرور غير متطابقة");
return;
}
await createUserWithEmailAndPassword(auth,regEmail.value,regPass.value);
}

// login
window.login=async()=>{
await signInWithEmailAndPassword(auth,logEmail.value,logPass.value);
}

// logout
document.getElementById("logoutBtn").onclick=()=>signOut(auth);

// auth state (FIX 🔥)
onAuthStateChanged(auth,(user)=>{
if(user){
authDiv.style.display="none";
dashboard.style.display="block";
logoutBtn.style.display="block";
}else{
authDiv.style.display="flex";
dashboard.style.display="none";
course.style.display="none";
logoutBtn.style.display="none";
}
});

// courses
window.openCourse=(name)=>{
dashboard.style.display="none";
course.style.display="block";

content.innerHTML = `
<h2>${name}</h2>
<h3>📌 مقدمة</h3>
<p>شرح شامل للكورس</p>

<h3>📚 الدروس</h3>
<ul>
<li>درس 1</li>
<li>درس 2</li>
<li>درس 3</li>
</ul>
`.repeat(5);
}

// back
window.back=()=>{
course.style.display="none";
dashboard.style.display="block";
}

</script>

</body>
</html>
