<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>HOota Academy</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:'Cairo', sans-serif;
background:linear-gradient(180deg,#0f172a,#020617);
color:#fff;
}

/* NAV */
nav{
display:flex;
justify-content:space-between;
align-items:center;
padding:12px 18px;
background:#020617;
border-bottom:1px solid #111;
}

.logo{color:#00cfff;font-weight:900}

.logout{
background:#ef4444;
border:none;
padding:6px 12px;
border-radius:8px;
color:#fff;
cursor:pointer;
display:none;
}

/* AUTH */
.center{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.box{
width:340px;
padding:30px;
background:#0f172a;
border-radius:15px;
text-align:center;
}

input{
width:100%;
padding:10px;
margin:8px 0;
border-radius:10px;
border:none;
background:#1e293b;
color:#fff;
}

/* BUTTON */
button{
width:100%;
padding:10px;
border:none;
border-radius:10px;
cursor:pointer;
}

.btn-main{
background:#00cfff;
color:#000;
font-weight:bold;
}

/* DASHBOARD */
.dashboard{
display:none;
padding:20px;
}

.course{
display:none;
padding:20px;
}

/* TOAST */
.toast{
position:fixed;
top:20px;
right:20px;
background:#111827;
padding:12px;
border-radius:10px;
opacity:0;
transition:0.3s;
z-index:9999;
}

.toast.show{opacity:1}

.toast.success{border-right:4px solid #22c55e}
.toast.error{border-right:4px solid #ef4444}
.toast.info{border-right:4px solid #00cfff}

</style>
</head>

<body>

<div id="toast" class="toast"></div>

<nav>
<div class="logo">HOota Academy</div>
<button id="logoutBtn" class="logout">خروج</button>
</nav>

<!-- AUTH -->
<div id="auth" class="center">
<div class="box">

<div id="loginBox">
<h3>Login</h3>
<input id="logEmail" placeholder="Email">
<input id="logPass" type="password" placeholder="Password">
<button class="btn-main" onclick="login()">Login</button>
</div>

<div id="registerBox" style="display:none">
<h3>Register</h3>
<input id="regEmail">
<input id="regPass" type="password">
<input id="regPass2" type="password">
<button class="btn-main" onclick="register()">Create</button>
</div>

</div>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="dashboard">
<h2>🎓 الكورسات</h2>
</div>

<!-- COURSE -->
<div id="course" class="course"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
getAuth,
createUserWithEmailAndPassword,
signInWithEmailAndPassword,
onAuthStateChanged,
signOut
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

/* 🔥 FIXED FIREBASE CONFIG */
const app = initializeApp({
apiKey:"AIzaSyBsvF9DneR5H0JbOW4HX_JjVWaajAUgk",
authDomain:"website-8833c.firebaseapp.com",
projectId:"website-8833c"
});

const auth = getAuth(app);

const authDiv = document.getElementById("auth");
const dashboard = document.getElementById("dashboard");
const courseDiv = document.getElementById("course");
const logoutBtn = document.getElementById("logoutBtn");
const toast = document.getElementById("toast");

/* TOAST */
function showToast(msg,type="info"){
toast.innerText=msg;
toast.className="toast show "+type;
setTimeout(()=>toast.classList.remove("show"),2500);
}

/* LOGIN (WITH REAL ERROR) */
window.login=async()=>{
try{
await signInWithEmailAndPassword(auth,logEmail.value,logPass.value);
showToast("تم تسجيل الدخول","success");
}catch(e){
showToast(e.code || e.message,"error");
}
}

/* REGISTER (WITH REAL ERROR) */
window.register=async()=>{
if(regPass.value !== regPass2.value){
showToast("كلمات المرور غير متطابقة","error");
return;
}

try{
await createUserWithEmailAndPassword(auth,regEmail.value,regPass.value);
showToast("تم إنشاء الحساب","success");
}catch(e){
showToast(e.code || e.message,"error");
}
}

/* AUTH STATE */
onAuthStateChanged(auth,(user)=>{
if(user){
authDiv.style.display="none";
dashboard.style.display="block";
courseDiv.style.display="none";
logoutBtn.style.display="block";
showToast("مرحباً " + user.email,"info");
}else{
authDiv.style.display="flex";
dashboard.style.display="none";
courseDiv.style.display="none";
logoutBtn.style.display="none";
}
});

/* LOGOUT */
logoutBtn.onclick=async()=>{
await signOut(auth);
showToast("تم تسجيل الخروج","info");
};

</script>

</body>
</html>
