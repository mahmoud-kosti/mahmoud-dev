<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>HOota Academy</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Cairo', sans-serif;
  background: linear-gradient(180deg,#0f172a,#020617);
  color:#fff;
  visibility:hidden; /* 🔥 مهم جداً لمنع الرجفة */
}

/* LOADER */
#loader{
  position:fixed;
  inset:0;
  background:#020617;
  display:flex;
  justify-content:center;
  align-items:center;
  color:#00cfff;
  font-size:18px;
  z-index:9999;
}

/* NAV */
nav{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:12px 20px;
  background:#020617;
  border-bottom:1px solid #111;
}

.logo{
  font-weight:900;
  color:#00cfff;
  font-size:20px;
}

/* Logout */
.logout{
  background:#ef4444;
  border:none;
  padding:6px 12px;
  border-radius:8px;
  color:#fff;
  cursor:pointer;
  font-size:13px;
  transition:0.3s;
}

.logout:hover{
  transform:scale(1.05);
  background:#dc2626;
}

/* AUTH */
.center{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
}

.box{
  background:#020617;
  padding:35px;
  border-radius:18px;
  width:340px;
  text-align:center;
  border:1px solid #111;
  box-shadow:0 10px 30px rgba(0,0,0,0.5);
  transition:0.4s;
}

input{
  width:100%;
  padding:12px;
  margin:10px 0;
  border:none;
  border-radius:10px;
  background:#0f172a;
  color:#fff;
  outline:none;
}

/* BUTTONS */
button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  margin-top:10px;
  cursor:pointer;
}

.btn-main{
  background:#00cfff;
  color:#000;
  font-weight:bold;
}

.link{
  cursor:pointer;
  margin-top:12px;
  color:#00cfff;
}

/* DASHBOARD */
.dashboard{
  display:none;
  padding:20px;
}

/* COURSE */
.course{
  display:none;
  padding:20px;
  max-width:900px;
  margin:auto;
}

.back{
  border:1px solid #00cfff;
  color:#00cfff;
  background:transparent;
  padding:8px 18px;
  border-radius:25px;
  cursor:pointer;
  margin-bottom:20px;
}

</style>
</head>

<body>

<!-- 🔥 LOADER -->
<div id="loader">Loading...</div>

<nav>
<div class="logo">HOota Academy</div>
<button id="logoutBtn" class="logout">خروج</button>
</nav>

<!-- AUTH -->
<div id="auth" class="center">
<div class="box">

<div id="loginBox">
<h3>Login</h3>
<input id="logEmail" placeholder="Email">
<input id="logPass" type="password" placeholder="Password">
<button class="btn-main" onclick="login()">Login</button>
<p class="link" onclick="showRegister()">إنشاء حساب</p>
</div>

<div id="registerBox" style="display:none">
<h3>Register</h3>
<input id="regEmail" placeholder="Email">
<input id="regPass" type="password" placeholder="Password">
<input id="regPass2" type="password" placeholder="Confirm Password">
<button class="btn-main" onclick="register()">Create</button>
<p class="link" onclick="showLogin()">رجوع</p>
</div>

</div>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="dashboard">

<h2>🎓 الكورسات</h2>

<div class="grid">

<div class="card">
<div class="thumb"></div>
<div class="card-body">
<h3>HTML Course</h3>
<p>تعلم بناء المواقع من الصفر</p>
<button onclick="openCourse('html')">ابدأ</button>
</div>
</div>

</div>
</div>

<!-- COURSE -->
<div id="course" class="course">
<button class="back" onclick="back()">⬅ الرجوع</button>
<div id="content"></div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
getAuth,
createUserWithEmailAndPassword,
signInWithEmailAndPassword,
onAuthStateChanged,
signOut
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

/* 🔥 نفس API KEY حقك بدون تغيير */
const app = initializeApp({
apiKey:"AIzaSyBsvF9J_DneR5H0JbOW4HX_JjVWaajAUgk",
authDomain:"website-8833c.firebaseapp.com",
projectId:"website-8833c"
});

const auth = getAuth(app);

const authDiv = document.getElementById("auth");
const dashboard = document.getElementById("dashboard");
const courseDiv = document.getElementById("course");
const loader = document.getElementById("loader");

/* LOGIN */
window.login=async()=>{
try{
await signInWithEmailAndPassword(auth,logEmail.value,logPass.value);
}catch(e){
alert("خطأ في البيانات");
}
}

/* REGISTER */
window.register=async()=>{
if(regPass.value !== regPass2.value){
alert("كلمات المرور غير متطابقة");
return;
}

try{
await createUserWithEmailAndPassword(auth,regEmail.value,regPass.value);
}catch(e){
alert("فشل إنشاء الحساب");
}
}

/* 🔥 أهم إصلاح (منع الرجفة) */
onAuthStateChanged(auth,(user)=>{

loader.style.display="none";      // إخفاء التحميل
document.body.style.visibility="visible"; // إظهار الصفحة

if(user){
authDiv.style.display="none";
dashboard.style.display="block";
courseDiv.style.display="none";
}else{
authDiv.style.display="flex";
dashboard.style.display="none";
courseDiv.style.display="none";
}

});

/* TOGGLE */
window.showRegister=()=>{
loginBox.style.display="none";
registerBox.style.display="block";
}

window.showLogin=()=>{
registerBox.style.display="none";
loginBox.style.display="block";
}

/* COURSE */
window.openCourse=(name)=>{
dashboard.style.display="none";
courseDiv.style.display="block";
content.innerHTML="<h2>"+name+"</h2><p>محتوى الكورس</p>";
}

/* BACK */
window.back=()=>{
courseDiv.style.display="none";
dashboard.style.display="block";
}

/* LOGOUT */
logoutBtn.onclick=()=>signOut(auth);

</script>

</body>
</html>
