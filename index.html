<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>HOota Academy</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Cairo', sans-serif;
  background: linear-gradient(180deg,#0f172a,#020617);
  color:#fff;
}

/* NAV */
nav{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:12px 20px;
  background:#020617;
  border-bottom:1px solid #111;
}

.logo{
  font-weight:900;
  color:#00cfff;
  font-size:20px;
}

/* Logout improved */
.logout{
  background:#ef4444;
  border:none;
  padding:6px 12px;
  border-radius:8px;
  color:#fff;
  cursor:pointer;
  font-size:13px;
  transition:0.3s;
}

.logout:hover{
  transform:scale(1.05);
  background:#dc2626;
}

/* AUTH */
.center{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  animation:fadeIn 0.6s ease;
}

.box{
  background:#020617;
  padding:35px;
  border-radius:18px;
  width:340px;
  text-align:center;
  border:1px solid #111;
  box-shadow:0 10px 30px rgba(0,0,0,0.5);
  transition:0.4s;
}

.box:hover{
  transform:translateY(-3px);
}

input{
  width:100%;
  padding:12px;
  margin:10px 0;
  border:none;
  border-radius:10px;
  background:#0f172a;
  color:#fff;
  outline:none;
  transition:0.3s;
}

input:focus{
  border:1px solid #00cfff;
  transform:scale(1.02);
}

/* Buttons */
button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  margin-top:10px;
  cursor:pointer;
  transition:0.3s;
}

button:hover{
  transform:scale(1.03);
}

.btn-main{
  background:#00cfff;
  color:#000;
  font-weight:bold;
}

/* Switch link */
.link{
  cursor:pointer;
  margin-top:12px;
  color:#00cfff;
  transition:0.3s;
}

.link:hover{
  opacity:0.7;
}

.brand{
  margin-top:18px;
  font-size:22px;
  font-weight:900;
  color:#00cfff;
}

/* Smooth form switching */
.form{
  transition:0.5s ease;
  animation:slide 0.5s ease;
}

@keyframes slide{
  from{opacity:0; transform:translateY(20px);}
  to{opacity:1; transform:translateY(0);}
}

@keyframes fadeIn{
  from{opacity:0;}
  to{opacity:1;}
}

/* DASHBOARD */
.dashboard{
  display:none;
  padding:20px;
  animation:fadeIn 0.5s ease;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
  gap:20px;
  margin-top:20px;
}

/* CARD */
.card{
  background:#020617;
  border:1px solid #111;
  border-radius:15px;
  overflow:hidden;
  transition:0.3s;
}

.card:hover{
  transform:translateY(-5px);
}

.thumb{
  height:150px;
  background:linear-gradient(45deg,#00cfff,#6366f1);
}

.card-body{
  padding:15px;
}

/* COURSE */
.course{
  display:none;
  padding:20px;
  max-width:900px;
  margin:auto;
  animation:fadeIn 0.5s ease;
}

/* BACK BUTTON improved */
.back{
  border:1px solid #00cfff;
  color:#00cfff;
  background:transparent;
  padding:8px 18px;
  border-radius:25px;
  cursor:pointer;
  margin-bottom:20px;
  transition:0.3s;
  font-weight:bold;
}

.back:hover{
  background:#00cfff;
  color:#000;
  transform:scale(1.05);
}

.footer{
  margin-top:30px;
  text-align:center;
  opacity:0.8;
}
</style>
</head>

<body>

<nav>
<div class="logo">HOota Academy</div>
<button id="logoutBtn" class="logout">خروج</button>
</nav>

<!-- AUTH -->
<div id="auth" class="center">
<div class="box">

<div id="loginBox" class="form">
<h3>Login</h3>
<input id="logEmail" placeholder="Email">
<input id="logPass" type="password" placeholder="Password">
<button class="btn-main" onclick="login()">Login</button>
<p class="link" onclick="showRegister()">إنشاء حساب</p>
</div>

<div id="registerBox" class="form" style="display:none">
<h3>Register</h3>
<input id="regEmail" placeholder="Email">
<input id="regPass" type="password" placeholder="Password">
<input id="regPass2" type="password" placeholder="Confirm Password">
<button class="btn-main" onclick="register()">Create</button>
<p class="link" onclick="showLogin()">رجوع</p>
</div>

<div class="brand">حووته</div>

</div>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="dashboard">

<h2>🎓 الكورسات</h2>

<div class="grid">

<div class="card">
<div class="thumb"></div>
<div class="card-body">
<h3>HTML Course</h3>
<div class="rating">⭐⭐⭐⭐☆ (4.5)</div>
<p>تعلم بناء المواقع من الصفر</p>
<button onclick="openCourse('html')">ابدأ</button>
</div>
</div>

<div class="card">
<div class="thumb"></div>
<div class="card-body">
<h3>CSS Course</h3>
<div class="rating">⭐⭐⭐⭐☆ (4.6)</div>
<p>تصميم احترافي</p>
<button onclick="openCourse('css')">ابدأ</button>
</div>
</div>

<div class="card">
<div class="thumb"></div>
<div class="card-body">
<h3>JavaScript</h3>
<div class="rating">⭐⭐⭐⭐⭐ (4.8)</div>
<p>برمجة تفاعلية</p>
<button onclick="openCourse('js')">ابدأ</button>
</div>
</div>

</div>
</div>

<!-- COURSE -->
<div id="course" class="course">
<button class="back" onclick="back()">⬅ الرجوع للصفحة الرئيسية</button>
<div id="content"></div>

<div class="footer">
© Mahmoud Abdallah  
<br><br>
<a href="https://wa.me/249900623733" target="_blank">
<button class="btn-main">📞 واتساب</button>
</a>
</div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
getAuth,
createUserWithEmailAndPassword,
signInWithEmailAndPassword,
onAuthStateChanged,
signOut
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const app = initializeApp({
apiKey:"AIzaSyBsvF9J_DneR5H0JbOW4HX_JjVWaajAUgk",
authDomain:"website-8833c.firebaseapp.com",
projectId:"website-8833c"
});

const auth = getAuth(app);

const authDiv = document.getElementById("auth");
const dashboardDiv = document.getElementById("dashboard");
const courseDiv = document.getElementById("course");
const logoutBtn = document.getElementById("logoutBtn");

logoutBtn.onclick = ()=>signOut(auth);

/* smooth toggle */
window.showRegister=()=>{
loginBox.style.display="none";
registerBox.style.display="block";
}

window.showLogin=()=>{
registerBox.style.display="none";
loginBox.style.display="block";
}

window.register=async()=>{
if(regPass.value !== regPass2.value){
alert("كلمة المرور غير متطابقة");
return;
}
await createUserWithEmailAndPassword(auth,regEmail.value,regPass.value);
}

window.login=async()=>{
await signInWithEmailAndPassword(auth,logEmail.value,logPass.value);
}

onAuthStateChanged(auth,(user)=>{
if(user){
authDiv.style.display="none";
dashboardDiv.style.display="block";
logoutBtn.style.opacity="1";
}else{
authDiv.style.display="flex";
dashboardDiv.style.display="none";
courseDiv.style.display="none";
logoutBtn.style.opacity="0";
}
});

const courses = {
html:"<h2>HTML</h2><p>كورس كامل</p>".repeat(40),
css:"<h2>CSS</h2><p>تصميم</p>".repeat(40),
js:"<h2>JS</h2><p>برمجة</p>".repeat(40)
};

window.openCourse=(name)=>{
dashboardDiv.style.display="none";
courseDiv.style.display="block";
content.innerHTML=courses[name];
}

window.back=()=>{
courseDiv.style.display="none";
dashboardDiv.style.display="block";
}

</script>

</body>
</html>
