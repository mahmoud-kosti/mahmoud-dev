<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>HOota Academy</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">

<style>
:root{
  --bg-primary: #0A0E1A;
  --bg-secondary: #111827;
  --card-bg: rgba(17, 24, 39, 0.75);
  --border: rgba(255, 255, 255, 0.08);
  --primary: #00E5FF;
  --primary-glow: rgba(0, 229, 255, 0.4);
  --secondary: #8B5CF6;
  --secondary-glow: rgba(139, 92, 246, 0.4);
  --danger: #F43F5E;
  --success: #10B981;
  --text: #F9FAFB;
  --text-muted: #9CA3AF;
  --blur: 20px;
}

*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}

body{
  font-family:'Cairo', sans-serif;
  background: var(--bg-primary);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

/* Animated Gradient Background 2026 */
body::before{
  content:'';
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background:
    radial-gradient(circle at 15% 30%, rgba(0, 229, 255, 0.18), transparent 40%),
    radial-gradient(circle at 85% 70%, rgba(139, 92, 246, 0.18), transparent 40%),
    radial-gradient(circle at 50% 50%, rgba(236, 72, 153, 0.12), transparent 50%);
  z-index: -1;
  animation: gradientMove 25s infinite alternate ease-in-out;
}

@keyframes gradientMove{
  0%{transform: translate(0, 0) scale(1) rotate(0deg);}
  100%{transform: translate(5%, 3%) scale(1.1) rotate(10deg);}
}

/* NAV */
nav{
  position: sticky;
  top: 0;
  z-index: 100;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 14px 20px;
  background: rgba(10, 14, 26, 0.85);
  backdrop-filter: blur(var(--blur));
  -webkit-backdrop-filter: blur(var(--blur));
  border-bottom: 1px solid var(--border);
}

.logo{
  font-weight: 900;
  font-size: 22px;
  background: linear-gradient(135deg, var(--primary), var(--secondary));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

/* Button Base + Ripple */
button{
  position: relative;
  overflow: hidden;
  border: none;
  border-radius: 12px;
  font-family: 'Cairo', sans-serif;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  touch-action: manipulation;
}

button:active{
  transform: scale(0.96);
}

button:disabled{
  opacity: 0.5;
  cursor: not-allowed;
  transform: none!important;
}

button.ripple{
  position: absolute;
  border-radius: 50%;
  background: rgba(255, 255, 255, 0.6);
  transform: scale(0);
  animation: rippleEffect 0.6s ease-out;
  pointer-events: none;
}

@keyframes rippleEffect{
  to{transform: scale(4); opacity: 0;}
}

/* Logout Button */
.logout{
  background: var(--danger);
  padding: 8px 16px;
  border-radius: 10px;
  color: #fff;
  font-size: 14px;
  box-shadow: 0 4px 15px rgba(244, 63, 94, 0.3);
  opacity: 0;
  pointer-events: none;
}

.logout.active{
  opacity: 1;
  pointer-events: auto;
}

.logout:hover{
  box-shadow: 0 6px 20px rgba(244, 63, 94, 0.5);
  transform: translateY(-2px);
}

/* AUTH */
.center{
  min-height: calc(100vh - 60px);
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 20px;
  animation: fadeIn 0.8s ease;
}

.box{
  background: var(--card-bg);
  backdrop-filter: blur(var(--blur));
  -webkit-backdrop-filter: blur(var(--blur));
  padding: 40px 30px;
  border-radius: 24px;
  width: 100%;
  max-width: 380px;
  text-align: center;
  border: 1px solid var(--border);
  box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
  transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
}

input{
  width: 100%;
  padding: 14px 16px;
  margin: 10px 0;
  border: 1px solid var(--border);
  border-radius: 12px;
  background: rgba(0, 0, 0, 0.3);
  color: var(--text);
  font-family: 'Cairo', sans-serif;
  font-size: 15px;
  transition: all 0.3s ease;
  outline: none;
}

input:focus{
  border-color: var(--primary);
  background: rgba(0, 0, 0, 0.4);
  box-shadow: 0 0 0 4px var(--primary-glow);
  transform: scale(1.02);
}

input::placeholder{
  color: var(--text-muted);
}

.btn-main{
  width: 100%;
  padding: 14px;
  margin-top: 14px;
  background: linear-gradient(135deg, var(--primary), var(--secondary));
  color: #000;
  font-size: 16px;
  font-weight: 700;
  box-shadow: 0 8px 25px var(--primary-glow);
}

.btn-main:hover{
  box-shadow: 0 12px 35px var(--primary-glow);
  transform: translateY(-3px);
}

.link{
  cursor: pointer;
  margin-top: 16px;
  color: var(--primary);
  font-size: 14px;
  font-weight: 600;
  transition: 0.3s;
  display: inline-block;
}

.link:hover{
  opacity: 0.7;
  transform: scale(1.05);
}

.brand{
  margin-top: 24px;
  font-size: 28px;
  font-weight: 900;
  background: linear-gradient(135deg, var(--primary), var(--secondary));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.form{
  animation: slideUp 0.6s cubic-bezier(0.4, 0, 0.2, 1);
}

h3{
  font-size: 24px;
  font-weight: 900;
  margin-bottom: 20px;
}

@keyframes slideUp{
  from{opacity: 0; transform: translateY(30px);}
  to{opacity: 1; transform: translateY(0);}
}

@keyframes fadeIn{
  from{opacity: 0;}
  to{opacity: 1;}
}

/* DASHBOARD */
.dashboard{
  display: none;
  padding: 20px;
  max-width: 1200px;
  margin: 0 auto;
  animation: fadeIn 0.6s ease;
}

.dashboard h2{
  font-size: 28px;
  font-weight: 900;
  margin-bottom: 24px;
  text-align: center;
}

.grid{
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 20px;
}

.card{
  background: var(--card-bg);
  backdrop-filter: blur(var(--blur));
  -webkit-backdrop-filter: blur(var(--blur));
  border: 1px solid var(--border);
  border-radius: 20px;
  overflow: hidden;
  transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
}

.card:hover{
  transform: translateY(-8px) scale(1.02);
  box-shadow: 0 20px 50px rgba(0, 229, 255, 0.2);
  border-color: var(--primary);
}

.thumb{
  height: 160px;
  background: linear-gradient(135deg, var(--primary), var(--secondary));
  position: relative;
  overflow: hidden;
}

.thumb::after{
  content: '';
  position: absolute;
  top: 0; left: -100%;
  width: 100%; height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
  animation: shimmer 3s infinite;
}

@keyframes shimmer{
  100%{left: 100%;}
}

.card-body{
  padding: 20px;
}

.card-body h3{
  font-size: 20px;
  margin-bottom: 8px;
}

.rating{
  color: #FBBF24;
  font-size: 14px;
  margin: 8px 0;
}

.card-body p{
  color: var(--text-muted);
  font-size: 14px;
  margin: 10px 0 16px;
  line-height: 1.6;
}

.card-body button{
  width: 100%;
  padding: 12px;
  background: linear-gradient(135deg, var(--primary), var(--secondary));
  color: #000;
  font-size: 15px;
}

/* COURSE */
.course{
  display: none;
  padding: 20px;
  max-width: 900px;
  margin: 0 auto;
  animation: fadeIn 0.6s ease;
}

.back{
  display: inline-flex;
  align-items: center;
  gap: 8px;
  border: 2px solid var(--primary);
  color: var(--primary);
  background: transparent;
  padding: 10px 20px;
  border-radius: 50px;
  margin-bottom: 24px;
  font-weight: 700;
  font-size: 15px;
}

.back:hover{
  background: var(--primary);
  color: #000;
  box-shadow: 0 8px 25px var(--primary-glow);
  transform: translateX(-5px);
}

#content{
  background: var(--card-bg);
  backdrop-filter: blur(var(--blur));
  -webkit-backdrop-filter: blur(var(--blur));
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 30px;
  line-height: 2;
}

.footer{
  margin-top: 40px;
  text-align: center;
  padding: 30px 20px;
  border-top: 1px solid var(--border);
  color: var(--text-muted);
  font-size: 14px;
}

.footer button{
  margin-top: 16px;
  padding: 12px 24px;
  background: linear-gradient(135deg, #25D366, #128C7E);
  color: #fff;
}

/* Toast - بدل الـ Alert */
.toast{
  position: fixed;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%) translateY(100px);
  background: var(--card-bg);
  backdrop-filter: blur(var(--blur));
  border: 1px solid var(--border);
  padding: 16px 24px;
  border-radius: 12px;
  font-weight: 700;
  z-index: 1000;
  opacity: 0;
  transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
  max-width: 90%;
  text-align: center;
}

.toast.show{
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

.toast.success{border-color: var(--success); color: var(--success);}
.toast.error{border-color: var(--danger); color: var(--danger);}

/* Mobile */
@media (max-width: 480px){
.box{padding: 30px 20px;}
.grid{grid-template-columns: 1fr;}
  nav{padding: 12px 16px;}
.logo{font-size: 20px;}
  h3{font-size: 22px;}
.dashboard h2{font-size: 24px;}
}
</style>
</head>

<body>

<div id="toast" class="toast"></div>

<nav>
<div class="logo">HOota Academy</div>
<button id="logoutBtn" class="logout">خروج</button>
</nav>

<!-- AUTH -->
<div id="auth" class="center">
<div class="box">

<div id="loginBox" class="form">
<h3>تسجيل الدخول</h3>
<input id="logEmail" type="email" placeholder="البريد الإلكتروني">
<input id="logPass" type="password" placeholder="كلمة المرور">
<button class="btn-main" onclick="login()">دخول</button>
<p class="link" onclick="showRegister()">إنشاء حساب جديد</p>
</div>

<div id="registerBox" class="form" style="display:none">
<h3>إنشاء حساب</h3>
<input id="regEmail" type="email" placeholder="البريد الإلكتروني">
<input id="regPass" type="password" placeholder="كلمة المرور">
<input id="regPass2" type="password" placeholder="تأكيد كلمة المرور">
<button class="btn-main" onclick="register()">تسجيل</button>
<p class="link" onclick="showLogin()">رجوع لتسجيل الدخول</p>
</div>

<div class="brand">حووته</div>

</div>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="dashboard">

<h2>🎓 الكورسات المتاحة</h2>

<div class="grid">

<div class="card">
<div class="thumb"></div>
<div class="card-body">
<h3>HTML Course</h3>
<div class="rating">⭐⭐⭐⭐☆ 4.5</div>
<p>تعلم بناء المواقع من الصفر حتى الاحتراف</p>
<button onclick="openCourse('html')">ابدأ الآن</button>
</div>
</div>

<div class="card">
<div class="thumb"></div>
<div class="card-body">
<h3>CSS Course</h3>
<div class="rating">⭐⭐⭐⭐☆ 4.6</div>
<p>تصميم واجهات احترافية عصرية</p>
<button onclick="openCourse('css')">ابدأ الآن</button>
</div>
</div>

<div class="card">
<div class="thumb"></div>
<div class="card-body">
<h3>JavaScript</h3>
<div class="rating">⭐⭐⭐⭐⭐ 4.8</div>
<p>برمجة تفاعلية ومتقدمة</p>
<button onclick="openCourse('js')">ابدأ الآن</button>
</div>
</div>

</div>
</div>

<!-- COURSE -->
<div id="course" class="course">
<button class="back" onclick="back()">⬅ الرجوع للرئيسية</button>
<div id="content"></div>

<div class="footer">
© Mahmoud Abdallah 2026
<br><br>
<a href="https://wa.me/249900623733" target="_blank">
<button>📞 تواصل واتساب</button>
</a>
</div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
getAuth,
createUserWithEmailAndPassword,
signInWithEmailAndPassword,
onAuthStateChanged,
signOut
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const app = initializeApp({
apiKey:"AIzaSyBsvF9J_DneR5H0JbOW4HX_JjVWaajAUgk",
authDomain:"website-8833c.firebaseapp.com",
projectId:"website-8833c"
});

const auth = getAuth(app);

const authDiv = document.getElementById("auth");
const dashboardDiv = document.getElementById("dashboard");
const courseDiv = document.getElementById("course");
const logoutBtn = document.getElementById("logoutBtn");
const toast = document.getElementById("toast");

// Ripple Effect
function createRipple(event){
  const button = event.currentTarget;
  const circle = document.createElement("span");
  const diameter = Math.max(button.clientWidth, button.clientHeight);
  const radius = diameter / 2;
  const rect = button.getBoundingClientRect();

  circle.style.width = circle.style.height = `${diameter}px`;
  circle.style.left = `${event.clientX - rect.left - radius}px`;
  circle.style.top = `${event.clientY - rect.top - radius}px`;
  circle.classList.add("ripple");

  const ripple = button.getElementsByClassName("ripple")[0];
  if(ripple) ripple.remove();

  button.appendChild(circle);
}

document.addEventListener('click', function(e){
  if(e.target.closest('button')){
    createRipple(e);
  }
});

// Toast Function - ترجمة الأخطاء
function showToast(message, type = 'success'){
  const errors = {
    'auth/email-already-in-use': 'البريد الإلكتروني مستخدم بالفعل',
    'auth/invalid-email': 'البريد الإلكتروني غير صحيح',
    'auth/weak-password': 'كلمة المرور ضعيفة جداً',
    'auth/user-not-found': 'الحساب غير موجود',
    'auth/wrong-password': 'كلمة المرور خاطئة',
    'auth/too-many-requests': 'محاولات كثيرة، حاول لاحقاً'
  };

  toast.textContent = errors[message] || message;
  toast.className = `toast ${type} show`;
  setTimeout(() => {
    toast.className = 'toast';
  }, 3500);
}

logoutBtn.onclick = async ()=>{
  await signOut(auth);
  showToast('تم تسجيل الخروج', 'success');
};

window.showRegister = ()=>{
  loginBox.style.display = "none";
  registerBox.style.display = "block";
}

window.showLogin = ()=>{
  registerBox.style.display = "none";
  loginBox.style.display = "block";
}

window.register = async ()=>{
  const btn = event.target;
  if(regPass.value!== regPass2.value){
    showToast('كلمة المرور غير متطابقة', 'error');
    return;
  }
  if(regPass.value.length < 6){
    showToast('كلمة المرور يجب أن تكون 6 أحرف على الأقل', 'error');
    return;
  }

  btn.disabled = true;
  try{
    await createUserWithEmailAndPassword(auth, regEmail.value, regPass.value);
    showToast('تم إنشاء الحساب بنجاح', 'success');
  }catch(error){
    showToast(error.code, 'error');
  }finally{
    btn.disabled = false;
  }
}

window.login = async ()=>{
  const btn = event.target;
  btn.disabled = true;
  try{
    await signInWithEmailAndPassword(auth, logEmail.value, logPass.value);
    showToast('مرحباً بك', 'success');
  }catch(error){
    showToast(error.code, 'error');
  }finally{
    btn.disabled = false;
  }
}

onAuthStateChanged(auth, (user)=>{
  if(user){
    authDiv.style.display = "none";
    dashboardDiv.style.display = "block";
    logoutBtn.classList.add("active");
  }else{
    authDiv.style.display = "flex";
    dashboardDiv.style.display = "none";
    courseDiv.style.display = "none";
    logoutBtn.classList.remove("active");
  }
});

const courses = {
html: "<h2>HTML Course</h2><p>كورس HTML كامل من الصفر حتى الاحتراف. تعلم بناء هيكل المواقع بطريقة صحيحة.</p>".repeat(30),
css: "<h2>CSS Course</h2><p>تعلم تصميم الواجهات الاحترافية والتأثيرات البصرية العصرية.</p>".repeat(30),
js: "<h2>JavaScript Course</h2><p>برمجة تفاعلية ومتقدمة للمواقع والتطبيقات.</p>".repeat(30)
};

window.openCourse = (name)=>{
  dashboardDiv.style.display = "none";
  courseDiv.style.display = "block";
  content.innerHTML = courses[name];
  window.scrollTo(0, 0);
}

window.back = ()=>{
  courseDiv.style.display = "none";
  dashboardDiv.style.display = "block";
  window.scrollTo(0, 0);
}

</script>

</body>
</html>
